- name: Provisioning vpn host
  hosts: cc-vpn
  handlers:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./handlers/basic-handlers.yaml

  pre_tasks:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./tasks/pre-tasks.yaml

  vars:
    # printf CC | xxd
    wireguard_port: 4343

  tasks:
    - name: Hardening servers
      ansible.builtin.import_tasks: ./tasks/hardening.yaml

    - name: Allowing udp {{ wireguard_port }} for wireguard
      community.general.ufw:
        rule: allow
        port: "{{ wireguard_port }}"
        proto: udp
        comment: wireguard port

    - name: Configuring Wireguard VPN
      ansible.builtin.include_role:
        name: wireguard
      vars:
        wg_listen_port: '{{ wireguard_port }}'
        wg_endpoint: '{{ ansible_facts["default_ipv4"]["address"] }}:{{ wireguard_port }}'
        wireguard_users:
          - name: elrey
            ip_octet: 2
          - name: trvon
            ip_octet: 3

    - name: Allowing forwarding traffic from VPN to Internet
      community.general.ufw:
        rule: allow
        interface_in: 'wg0'
        interface_out: '{{ ansible_facts["default_ipv4"]["interface"] }}'
        to_ip: "any"
        comment: forwarding wg traffic
        route: true

    - name: Install Docker
      ansible.builtin.include_role:
        name: geerlingguy.docker

    - name: Install python lib for ansible via docker
      ansible.builtin.include_role:
        name: geerlingguy.pip
      vars:
        pip_install_packages:
        - docker

    # https://docs.pangolin.net/self-host/quick-install#prerequisites
    - name: Allowing tcp ports for Pangolin
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
        comment: tcp Pangolin ports
      loop:
        - 80
        - 443

    - name: Allowing udp ports for Pangolin
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: udp
        comment: udp Pangolin ports
      loop:
        - 21820
        - 51820

