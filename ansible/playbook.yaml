    #     pangolin_domain: '{{ lookup("env", "PANGOLIN_DASH_DOMAIN") }}'
    #     pangolin_email:  '{{ lookup("env", "PANGOLIN_EMAIL") }}'
    #     pangolin_base_domain: '{{ lookup("env", "PANGOLIN_DOMAIN") }}'

