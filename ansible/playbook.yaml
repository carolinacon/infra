- name: Provisioning pretalx host
  hosts: pretalx, pretalx-dev
  handlers:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./handlers/basic-handlers.yaml

  pre_tasks:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./tasks/pre-tasks.yaml

  vars:
    pretalx_database_name: pretalx
    pretalx_database_user: pretalx
    pretalx_database_password: '{{ lookup("env", "PRETALX_DB_PASSWORD") }}'
    pretalx_system_user: "pretalx"
    pretalx_system_home: "/home/{{ pretalx_system_user }}"
    pretalx_instance_identifier: "main"
    pretalx_virtualenv: /usr/share/webapps/pretalx{{ pretalx_instance_identifier }}/venv/
    # for backup and restoration
    pretalx_backup_dir: /var/backups/pretalx
    pretalx_config_file: '{{ pretalx_system_home }}/.pretalx.cfg'
    pretalx_data_dir: /usr/share/webapps/pretalx{{ pretalx_instance_identifier }}/data/
    pretalx_media_dir: /usr/share/webapps/pretalx{{ pretalx_instance_identifier }}/media/
    pretalx_pg_host: localhost
    pretalx_pg_port: 5432
    pretalx_backup_bucket: '{{ lookup("env", "PRETALX_S3_BUCKET") }}'
    pretalx_backup_retention_local: 14
    pretalx_backup_retention_remote: 30

    r2_account_endpoint: '{{ lookup("env", "PRETALX_S3_ENDPOINT") }}'
    r2_access_key: '{{ lookup("env", "PRETALX_S3_ACCESS_KEY") }}'
    r2_secret_key: '{{ lookup("env", "PRETALX_S3_SECRET_KEY") }}'


  tasks:
    - name: Hardening servers
      ansible.builtin.import_tasks: ./tasks/hardening.yaml

    - name: Connecting to Pangolin
      ansible.builtin.import_tasks: ./tasks/newt_client.yaml

    - name: Install system dependencies
      ansible.builtin.package:
        name:
          - acl
          - nginx
          - python3-pip
          - python3-venv
          - redis-server
          - build-essential
          - libpq-dev
          - libjpeg-dev
          - zlib1g-dev
          - libssl-dev
          - git
          - zstd
          # For backup/restoration
          - postgresql-client
          - rsync
          - tar
          - gzip
          - zstd
          - rclone
        state: present

    - name: Remove nginx default site
      ansible.builtin.file:
        name: '/etc/nginx/sites-enabled/default'
        state: absent

    - name: Start and enable Redis
      ansible.builtin.service:
        name: redis-server
        state: started
        enabled: true

    - name: Install PostgreSQL
      ansible.builtin.include_role:
        name: anxs.postgresql
      vars:
        # PostgreSQL role configuration
        postgresql_databases:
          - name: '{{ pretalx_database_name }}'
            owner: '{{ pretalx_database_user }}'
        postgresql_users:
          - name: '{{ pretalx_database_user }}'
            pass: '{{ pretalx_database_password }}'
        postgresql_locale: 'C.UTF-8'
        postgresql_ctype: 'C.UTF-8'

    - name: Pause when restoring
      ansible.builtin.pause:
        prompt: "DB should be re-created, restore back and rsync files (Enter to continue)"
      when: pretalx_recovery is defined

    # become pretalx user by doing:
    # $ sudo -u pretalx /usr/share/webapps/pretalxmain/venv/bin/python -m pretalx <cmd>
    ## Setup after installation
    # $ sudo -u pretalx /usr/share/webapps/pretalxmain/venv/bin/python -m pretalx check --deploy
    # $ sudo -u pretalx /usr/share/webapps/pretalxmain/venv/bin/python -m pretalx migrate
    # $ sudo -u pretalx /usr/share/webapps/pretalxmain/venv/bin/python -m pretalx rebuild --npm-install
    # $ sudo -u pretalx /usr/share/webapps/pretalxmain/venv/bin/python -m pretalx init
    # Welcome to pretalx! This is my initialization command, please use it only once.
    # You can abort this command at any time using C-c, and it will save no data.
    # 
    # Let's get you a user with the right to create new events and access every event on this pretalx instance.
    # Email: <redacted>
    # Password: 
    # Password (again): 
    # Superuser created successfully.
    # 
    # Let's also create a first organiser: This will allow you to invite further people and create events.
    # 
    # Name (e.g. "The Conference Organiser"): Main CarolinaCon Admin
    # Slug (e.g. "conforg", used in urls): <redacted>
    # 
    # Now that this is done, you can:
    #  - Create your first event at https://cfp.carolinacon.org/orga/event/new/
    #  - Invite somebody to the organiser team at https://cfp.carolinacon.org/orga/organiser/<redacted>/teams/1/
    ## misc
    # auto-checks for updates here: https://cfp.carolinacon.org/orga/admin/update/
    - name: Install Pretalx
      ansible.builtin.include_role:
        name: pretalx
      vars:
        # Database configuration
        pretalx_database_host: localhost
        pretalx_database_port: 5432

        # Pretalx site configuration
        pretalx_domain: '{{ lookup("env", "PRETALX_DOMAIN") }}'
        pretalx_url: 'https://{{ pretalx_domain }}'
        pretalx_secret_key: '{{ lookup("env", "PRETALX_SECRET_KEY") }}'
        pretalx_python: "{{ pretalx_virtualenv }}/bin/python"

        # Mail configuration
        pretalx_admin_mail: '{{ lookup("env", "PRETALX_ADMIN_EMAIL") }}'
        pretalx_mail_from: '{{ lookup("env", "PRETALX_MAIL_FROM") }}'
        pretalx_mail_host: '{{ lookup("env", "PRETALX_MAIL_HOST") }}'
        pretalx_mail_port: '{{ lookup("env", "PRETALX_MAIL_PORT") | default("587") }}'
        pretalx_mail_user: '{{ lookup("env", "PRETALX_MAIL_USER") }}'
        pretalx_mail_password: '{{ lookup("env", "PRETALX_MAIL_PASSWORD") }}'
        pretalx_mail_tls: 'True'
        pretalx_mail_ssl: 'False'

        # Redis configuration
        pretalx_redis: redis://localhost:6379/1
        pretalx_celery_backend: "redis://127.0.0.1:6379/2"
        pretalx_celery_broker: "redis://127.0.0.1:6379/3"

        # Nginx configuration
        pretalx_nginx: true
        pretalx_nginx_path: '/etc/nginx/sites-enabled'
        pretalx_webserver_group: 'www-data'
        pretalx_nginx_http_only: true

        # Pretalx version
        pretalx_version: "2026.1.2"
        pretalx_plugins: False

        ### Not working...
        ## S3 configuration for media storage
        ## Note: This configuration is added to pretalx.cfg
        #pretalx_additional_config: |
        #  [storages]
        #  default = storages.backends.s3boto3.S3Boto3Storage
        #  staticfiles = django.contrib.staticfiles.storage.StaticFilesStorage

        #  [s3]
        #  bucket_name = {{ lookup("env", "PRETALX_S3_BUCKET") }}
        #  region_name = {{ lookup("env", "PRETALX_S3_REGION") | default("auto") }}
        #  endpoint_url = {{ lookup("env", "PRETALX_S3_ENDPOINT") }}
        #  access_key_id = {{ lookup("env", "PRETALX_S3_ACCESS_KEY") }}
        #  secret_access_key = {{ lookup("env", "PRETALX_S3_SECRET_KEY") }}
        #  custom_domain = {{ lookup("env", "PRETALX_S3_CUSTOM_DOMAIN") | default("") }}

    ## S3 not working
    # - name: Install boto3 for S3 storage support
    #   ansible.builtin.pip:
    #     name: boto3
    #     state: latest
    #     virtualenv: '{{ pretalx_virtualenv }}'
    #   become: true
    #   become_user: '{{ pretalx_system_user }}'
    #   when: lookup("env", "PRETALX_S3_BUCKET") | length > 0
    - name: Create backup directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      loop:
        - "{{ pretalx_backup_dir }}"
        - "{{ pretalx_backup_dir }}/tmp"
        - "{{ pretalx_backup_dir }}/archive"
        - "{{ pretalx_backup_dir }}/logs"

    - name: Create rclone configuration directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - "/root/.config"
        - "/root/.config/rclone"

    - name: Install rclone configuration
      ansible.builtin.copy:
        dest: /root/.config/rclone/rclone.conf
        owner: root
        group: root
        mode: "0600"
        content: |
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = {{ r2_access_key }}
          secret_access_key = {{ r2_secret_key }}
          endpoint = {{ r2_account_endpoint }}
          acl = private
          no_check_bucket = true
          region = auto

    - name: Install pretalx backup script
      ansible.builtin.template:
        src: pretalx-backup.sh.j2
        dest: /usr/local/sbin/pretalx-backup.sh
        owner: root
        group: root
        mode: "0750"

    - name: Install systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/pretalx-backup.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Pretalx Backup Job
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/pretalx-backup.sh

          # Security hardening
          PrivateTmp=true
          ProtectSystem=strict
          # ProtectHome=true
          NoNewPrivileges=true
          ReadWritePaths={{ pretalx_backup_dir }} {{ pretalx_data_dir }}

    - name: Install systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/pretalx-backup.timer
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Run Pretalx backups nightly

          [Timer]
          OnCalendar=*-*-* 02:30:00
          RandomizedDelaySec=15m
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start backup timer
      ansible.builtin.systemd:
        name: pretalx-backup.timer
        enabled: true
        state: started

    - name: Install PostgreSQL password file
      ansible.builtin.copy:
        dest: '{{ pretalx_system_home }}/.pgpass'
        owner: pretalx
        group: pretalx
        mode: "0600"
        content: |
          {{ pretalx_pg_host }}:{{ pretalx_pg_port }}:{{ pretalx_database_name }}:{{ pretalx_database_user }}:{{ pretalx_database_password }}

- name: Provisioning ctfd host
  hosts: ctfd, ctfd-dev
  handlers:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./handlers/basic-handlers.yaml

  pre_tasks:
    - name: Importing handlers
      ansible.builtin.import_tasks: ./tasks/pre-tasks.yaml
  tasks:
    - name: Hardening servers
      ansible.builtin.import_tasks: ./tasks/hardening.yaml
    - name: Install Docker
      ansible.builtin.include_role:
        name: geerlingguy.docker
